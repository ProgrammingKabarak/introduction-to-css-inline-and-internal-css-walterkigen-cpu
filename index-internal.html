<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Internal CSS Demo — Walter Kigen</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 20px;
      color: #333;
    }

    h1 {
      color: #2c3e50;
      text-align: center;
      border-bottom: 3px solid #2c3e50;
      padding-bottom: 10px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      max-width: 600px;
      margin: 20px auto;
    }

    p strong {
      color: #e74c3c;
    }

    ul {
      list-style-type: square;
      max-width: 600px;
      margin: 0 auto;
      padding-left: 20px;
    }

    ul li {
      margin-bottom: 8px;
    }

    button {
      display: block;
      margin: 20px auto;
      padding: 10px 20px;
      background-color: #2c3e50;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Internal CSS Demo</h1>

  <p>
    This page is styled using a <strong>&lt;style&gt;</strong> block inside the <strong>&lt;head&gt;</strong>.
    Internal CSS keeps all rules in one place, making it easier to update styles consistently
    across the whole page compared to inline CSS.
  </p>

  <ul>
    <li>First list item</li>
    <li>Second list item</li>
    <li>Third list item</li>
  </ul>

  <button>Click Me</button>

</body>
</html>
